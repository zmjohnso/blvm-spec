name: Spec Meta

on:
  push:
    branches: [ main ]
    paths:
      - 'PROTOCOL.md'
      - 'ARCHITECTURE.md'
      - 'THE_ORANGE_PAPER.md'
      - 'scripts/spec-meta.mjs'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-spec-meta:
    name: Update SPEC_META.json
    runs-on: [self-hosted, Linux, X64, builds]

    steps:
      - uses: actions/checkout@v6
        with:
          # Fetch all tags so git describe resolves correctly
          fetch-depth: 0
          # Use a PAT when available so the bot commit re-triggers downstream workflows.
          # Falls back to GITHUB_TOKEN (bot commit will carry [skip ci] to prevent loops).
          token: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Generate SPEC_META.json
        run: node scripts/spec-meta.mjs

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet SPEC_META.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated SPEC_META.json
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SPEC_META.json
          git commit -m "chore: update SPEC_META.json [skip ci]"
          git push

      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "SPEC_META.json is already up to date."

  verify-spec-meta:
    name: Verify SPEC_META.json (PRs)
    runs-on: [self-hosted, Linux, X64, builds]

    # On PRs only — verify the file is not stale without auto-committing
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Verify SPEC_META.json is up to date
        run: node scripts/spec-meta.mjs --verify
